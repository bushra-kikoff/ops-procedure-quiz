<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Closure Procedures - Kikoff Agent Quiz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #1a1a2e; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
  .quiz-container { max-width: 720px; width: 100%; background: #fff; border-radius: 16px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); overflow: hidden; }
  .quiz-header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 24px 32px; }
  .quiz-header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .quiz-header .meta { font-size: 13px; opacity: 0.8; display: flex; gap: 16px; flex-wrap: wrap; }
  .quiz-header .meta span { display: flex; align-items: center; gap: 4px; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.2); }
  .progress-fill { height: 100%; background: #4ecca3; transition: width 0.4s ease; }
  .quiz-body { padding: 32px; }
  .question-counter { font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .question-type { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-bottom: 12px; font-weight: 600; }
  .question-type.mc { background: #e3f2fd; color: #1565c0; }
  .question-type.scenario { background: #fce4ec; color: #c62828; }
  .question-text { font-size: 17px; font-weight: 600; line-height: 1.5; margin-bottom: 24px; color: #1a1a2e; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 15px; line-height: 1.4; display: flex; align-items: flex-start; gap: 12px; }
  .option:hover:not(.disabled) { border-color: #4ecca3; background: #f0fdf4; }
  .option.selected { border-color: #4ecca3; background: #f0fdf4; }
  .option.correct { border-color: #2e7d32; background: #e8f5e9; }
  .option.incorrect { border-color: #c62828; background: #ffebee; }
  .option.disabled { cursor: default; opacity: 0.7; }
  .option.disabled.correct { opacity: 1; }
  .option-letter { width: 28px; height: 28px; min-width: 28px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #666; }
  .option.correct .option-letter { background: #2e7d32; color: #fff; }
  .option.incorrect .option-letter { background: #c62828; color: #fff; }
  .feedback { margin-top: 16px; padding: 14px 18px; border-radius: 10px; font-size: 14px; line-height: 1.5; display: none; }
  .feedback.correct { background: #e8f5e9; border-left: 4px solid #2e7d32; color: #1b5e20; }
  .feedback.incorrect { background: #ffebee; border-left: 4px solid #c62828; color: #b71c1c; }
  .feedback.show { display: block; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: #1a1a2e; color: #fff; }
  .btn-primary:hover { background: #16213e; transform: translateY(-1px); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .btn-secondary { background: #f0f0f0; color: #333; }
  .btn-secondary:hover { background: #e0e0e0; }
  .btn-row { display: flex; justify-content: flex-end; margin-top: 24px; gap: 12px; }
  .results { text-align: center; padding: 40px 32px; }
  .results-icon { font-size: 64px; margin-bottom: 16px; }
  .results h2 { font-size: 24px; margin-bottom: 8px; }
  .results .score { font-size: 48px; font-weight: 800; margin: 16px 0; }
  .results .score.pass { color: #2e7d32; }
  .results .score.fail { color: #c62828; }
  .results .detail { font-size: 15px; color: #666; margin-bottom: 8px; }
  .results-breakdown { text-align: left; margin: 24px 0; padding: 20px; background: #f8f9fa; border-radius: 12px; }
  .results-breakdown h3 { font-size: 15px; margin-bottom: 12px; color: #333; }
  .breakdown-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
  .breakdown-item:last-child { border: none; }
  .breakdown-item .label { color: #666; }
  .breakdown-item .value { font-weight: 600; }
  .copy-code { margin-top: 20px; padding: 16px; background: #1a1a2e; color: #4ecca3; border-radius: 10px; font-family: monospace; font-size: 13px; word-break: break-all; cursor: pointer; position: relative; }
  .copy-code:hover { background: #16213e; }
  .copy-code::after { content: 'Click to copy'; position: absolute; top: -8px; right: 12px; background: #4ecca3; color: #1a1a2e; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; font-family: -apple-system, sans-serif; }
  .copy-code.copied::after { content: 'Copied!'; background: #2e7d32; color: #fff; }
  .hidden { display: none; }
  .start-screen { text-align: center; padding: 40px 32px; }
  .start-screen h2 { font-size: 22px; margin-bottom: 12px; }
  .start-screen p { color: #666; font-size: 15px; margin-bottom: 24px; line-height: 1.6; }
  .start-info { display: flex; gap: 24px; justify-content: center; margin-bottom: 32px; flex-wrap: wrap; }
  .start-info-item { text-align: center; }
  .start-info-item .num { font-size: 28px; font-weight: 800; color: #1a1a2e; }
  .start-info-item .lbl { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="quiz-container">
  <div class="quiz-header">
    <h1 id="quizTitle">Account Closure Procedures</h1>
    <div class="meta">
      <span>Offboarding</span>
      <span id="questionCountMeta">14 Questions</span>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div id="startScreen" class="start-screen">
    <h2>Ready to test your knowledge?</h2>
    <p>This quiz covers the <strong>Account Closure Procedures</strong> procedure. Answer each question carefully - you'll get immediate feedback after each answer.</p>
    <div class="start-info">
      <div class="start-info-item"><div class="num" id="totalQNum">14</div><div class="lbl">Questions</div></div>
      <div class="start-info-item"><div class="num">80%</div><div class="lbl">To Pass</div></div>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
  </div>

  <div id="questionScreen" class="quiz-body hidden">
    <div class="question-counter" id="questionCounter"></div>
    <div class="question-type" id="questionType"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="feedback" id="feedback"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>Next</button>
    </div>
  </div>

  <div id="resultsScreen" class="results hidden">
    <div class="results-icon" id="resultsIcon"></div>
    <h2 id="resultsTitle"></h2>
    <div class="score" id="resultsScore"></div>
    <div class="detail" id="resultsDetail"></div>
    <div class="results-breakdown" id="resultsBreakdown"></div>
    <div class="copy-code" id="copyCode" onclick="copyResults()"></div>
    <div class="btn-row" style="justify-content:center;margin-top:24px;">
      <button class="btn btn-secondary" onclick="retakeQuiz()">Retake Quiz</button>
    </div>
  </div>
</div>

<script>
// QUIZ DATA - Replace this with actual quiz data
const QUIZ_DATA = {
  "title": "Kikoff Account Closure Mastery",
  "questions": [
    {
      "type": "scenario",
      "question": "A customer on a Basic Plan is frustrated and says, 'I can't afford this anymore.' According to the 'Do's and Don'ts' of Empathy, how should you structure your response?",
      "options": [
        "'I know how you feel, let's see if we can get you a discount.'",
        "'I understand this is a guideline we have to follow for closures.'",
        "'It is stressful to manage expenses because your budget is tight right now.'",
        "'I am so sorry to hear that, I feel terrible that you are struggling.'"
      ],
      "correct": 2,
      "explanation": "Procedure mandates using the structure: 'It is (feeling) because (reason of feeling)'. [cite: 78] You should avoid phrases like 'I know' or 'I understand' [cite: 83] and never use the word 'guideline'. [cite: 85]",
      "category": "Soft Skills"
    },
    {
      "type": "mc",
      "question": "When applying a celebration reward discount for a Basic Plan user in AdminTool, what value must you enter to provide the correct $3.01 discount?",
      "options": [
        "3.01",
        "301",
        "300",
        "3"
      ],
      "correct": 1,
      "explanation": "Rewards in AdminTool are entered using cents ($0.01). [cite: 183] Therefore, a $3.01 discount must be entered as 301. [cite: 181, 184]",
      "category": "Technical Execution"
    },
   {
      "type": "scenario",
      "question": "Which of the following is considered a 'Don't' when empathizing with a customer during a closure request?",
      "options": [
        "Paraphrasing the user's feeling and reason.",
        "Matching the user's tone.",
        "Focusing on the user and explaining the reason behind procedures.",
        "Using words like 'procedure,' 'policy,' or 'guideline.'"
      ],
      "correct": 3,
      "explanation": "When empathizing, you should never use words like 'procedure,' 'policy,' or 'guideline.' [cite: 953-954]",
      "category": "Soft Skills"
    },
   {
      "type": "scenario",
      "question": "A customer says, 'My score hasn't changed at all, Kikoff isn't working for me.' What educational data point should you provide?",
      "options": [
        "Tell them scores only change once every six months.",
        "Mention that Kikoff customers see a 58-point increase on average after 3+ months of consistent payments.",
        "Explain that they need to spend more in the Kikoff store to see a change.",
        "Advise them that score changes are completely random."
      ],
      "correct": 1,
      "explanation": "For 'Results' objections, educate the user that on average, Kikoff customers experience a 58-point increase after just 3+ months of consistent on-time payments. [cite: 909, 965, 1035]",
      "category": "Education"
    },
    {
      "type": "scenario",
      "question": "A customer states they have 'lost their job' and need to cancel. What is the correct protocol?",
      "options": [
        "Educate them on the 58-point average score increase first.",
        "Offer the $5.00 discount immediately to help with hardship.",
        "Skip the discount offer and proceed directly to manual closure.",
        "Recommend they downgrade to the Basic Plan."
      ],
      "correct": 2,
      "explanation": "When a customer states they lost their job, you must skip the discount offer and move directly to manual closure. [cite: 20, 22]",
      "category": "Logic Flow"
    },
    {
      "type": "mc",
      "question": "Which specific status must you select in CST when successfully closing a Secured Card (SC)?",
      "options": [
        "Closed - User Request",
        "Cancel w/ Refund",
        "Inactive - Pending",
        "Deactivated"
      ],
      "correct": 1,
      "explanation": "In CST, under 'update account information,' you must change the status to 'Cancel w/ Refund' and set the active flag to 'No'. [cite: 290]",
      "category": "Technical Execution"
    },
    {
      "type": "mc",
      "question": "A customer has a Credit Account (CA), a Credit Builder Loan (CBL), and a Secured Card (SC). Which macro should be used for offboarding?",
      "options": [
        "#Kikoff::CA Offboarding::Close CA",
        "#Kikoff::CA Offboarding::Close CA CBL",
        "#Kikoff::CA Offboarding::Manual Closure",
        "#Kikoff::CA Offboarding::Close CA CBL SC"
      ],
      "correct": 3,
      "explanation": "If a user has all three products active, use the #Kikoff::CA Offboarding::Close CA CBL SC macro. [cite: 228, 229]",
      "category": "Macros"
    },
    {
      "type": "mc",
      "question": "Why would an agent be UNABLE to close a customer's Secured Card immediately?",
      "options": [
        "The customer has a Premium Plan.",
        "The account has a pending transaction or a negative balance.",
        "The customer hasn't used the card in 30 days.",
        "The agent does not have access to AdminTool."
      ],
      "correct": 1,
      "explanation": "SC closure is blocked if there is a negative balance, pending dispute, pending transaction, or pending transfer. ",
      "category": "Technical Execution"
    },
    {
      "type": "mc",
      "question": "During a manual closure where no refund is requested or issued, how should the 'Reverse all transactions' toggle be set?",
      "options": [
        "Yes",
        "No",
        "Leave blank",
        "N/A"
      ],
      "correct": 1,
      "explanation": "If you did not issue a refund, you must ensure 'Reverse all transactions' is set to 'No'. [cite: 250]",
      "category": "Technical Execution"
    },
    {
      "type": "mc",
      "question": "If a call is disconnected before you can complete the closure, what is the next step?",
      "options": [
        "Close the account anyway based on the verbal request.",
        "Mark the ticket as solved with a note about the drop.",
        "Send an outbound email using the 'Close Account Call Follow-Up' macro.",
        "Wait for the customer to call back."
      ],
      "correct": 2,
      "explanation": "If disconnected, you must send an outbound email using the #Kikoff::CA Offboarding::Close Account Call Follow-Up macro to confirm they still want to proceed. [cite: 66, 67]",
      "category": "Logic Flow"
    },
    {
      "type": "scenario",
      "question": "A user on the Ultimate Plan says, 'Kikoff is too expensive and I want to cancel.' What is the correct Tiered Save Approach?",
      "options": [
        "Offer the $5.00 discount immediately.",
        "Recommend downgrading to the Basic Plan first [cite: 1013], then offer a $5.00 discount if they still want to cancel[cite: 980].",
        "Close the account immediately to avoid further frustration.",
        "Tell them the Ultimate plan is the only way to build credit."
      ],
      "correct": 1,
      "explanation": "For Financial objections on upgraded plans, first recommend switching back to Basic[cite: 1013]. If they still want to cancel, offer the $5.00 discount[cite: 980].",
      "category": "Retention Flow"
    },
    {
      "type": "scenario",
      "question": "A customer on an Ultimate plan wants to cancel because they 'don't use the features.' Before offering a discount, what is the recommended step?",
      "options": [
        "Close the account immediately to respect their time.",
        "Offer to downgrade their account to the Basic Plan.",
        "Ignore the comment and offer the $5.00 discount.",
        "Transfer the call to a supervisor."
      ],
      "correct": 1,
      "explanation": "If a customer is on a Premium or Ultimate plan and has financial or value concerns, you should first offer a downgrade to the Basic Plan. [cite: 29, 30, 143, 144]",
      "category": "Retention Flow"
    },
    {
      "type": "mc",
      "question": "What must be entered in the 'Additional Comments' box when processing a manual closure in AdminTool?",
      "options": [
        "The customer's reason for closing.",
        "The ZenDesk ticket ID.",
        "Your agent name and ID.",
        "The date of the request."
      ],
      "correct": 1,
      "explanation": "When performing a manual closure, you must check 'User Request' for the reason and link the ZenDesk ticket ID in the additional comments. [cite: 248]",
      "category": "Manual Closure"
    },
    {
      "type": "mc",
      "question": "You find an 'Ongoing Dispute' while checking a Secured Card (SC) for closure. How long might the customer have to wait for the dispute to resolve before closure?",
      "options": [
        "Up to 7 business days.",
        "Up to 30 days.",
        "Up to 90 days.",
        "Disputes do not block account closure."
      ],
      "correct": 2,
      "explanation": "Accounts with active disputes cannot be closed until the dispute is resolved, which may take up to 90 days. [cite: 283]",
      "category": "Secured Card"
    }
  ]
};

let currentQuestion = 0;
let score = 0;
let answers = [];
let startTime;

function startQuiz() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('questionScreen').classList.remove('hidden');
  startTime = new Date();
  showQuestion();
}

function showQuestion() {
  const q = QUIZ_DATA.questions[currentQuestion];
  const total = QUIZ_DATA.questions.length;
  document.getElementById('questionCounter').textContent = `Question ${currentQuestion + 1} of ${total}`;
  document.getElementById('questionType').textContent = q.type === 'mc' ? 'Multiple Choice' : 'Scenario';
  document.getElementById('questionType').className = `question-type ${q.type}`;
  document.getElementById('questionText').textContent = q.question;
  document.getElementById('progressFill').style.width = `${((currentQuestion) / total) * 100}%`;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').disabled = true;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<div class="option-letter">${letters[i]}</div><div>${opt}</div>`;
    div.onclick = () => selectAnswer(i);
    container.appendChild(div);
  });
}

function selectAnswer(index) {
  const q = QUIZ_DATA.questions[currentQuestion];
  const options = document.querySelectorAll('.option');
  const feedback = document.getElementById('feedback');
  const isCorrect = index === q.correct;

  options.forEach((opt, i) => {
    opt.classList.add('disabled');
    opt.onclick = null;
    if (i === q.correct) opt.classList.add('correct');
    if (i === index && !isCorrect) opt.classList.add('incorrect');
  });

  if (isCorrect) {
    score++;
    feedback.className = 'feedback correct show';
    feedback.textContent = q.explanation || 'Correct!';
  } else {
    feedback.className = 'feedback incorrect show';
    feedback.textContent = q.explanation || `Incorrect. The correct answer is ${['A','B','C','D'][q.correct]}.`;
  }

  answers.push({ question: currentQuestion + 1, correct: isCorrect, category: q.category || 'General' });
  document.getElementById('nextBtn').disabled = false;
  if (currentQuestion === QUIZ_DATA.questions.length - 1) {
    document.getElementById('nextBtn').textContent = 'See Results';
  }
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion >= QUIZ_DATA.questions.length) {
    showResults();
  } else {
    showQuestion();
  }
}

function showResults() {
  document.getElementById('questionScreen').classList.add('hidden');
  document.getElementById('resultsScreen').classList.remove('hidden');
  document.getElementById('progressFill').style.width = '100%';

  const total = QUIZ_DATA.questions.length;
  const pct = Math.round((score / total) * 100);
  const passed = pct >= 80;
  const elapsed = Math.round((new Date() - startTime) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;

  document.getElementById('resultsIcon').textContent = passed ? '\u2705' : '\u274C';
  document.getElementById('resultsTitle').textContent = passed ? 'Great job! You passed!' : 'Keep studying - you can do better!';
  document.getElementById('resultsScore').textContent = `${pct}%`;
  document.getElementById('resultsScore').className = `score ${passed ? 'pass' : 'fail'}`;
  document.getElementById('resultsDetail').textContent = `${score} out of ${total} correct \u2022 ${mins}m ${secs}s`;

  // Category breakdown
  const categories = {};
  answers.forEach(a => {
    if (!categories[a.category]) categories[a.category] = { correct: 0, total: 0 };
    categories[a.category].total++;
    if (a.correct) categories[a.category].correct++;
  });

  let breakdownHTML = '<h3>Performance by Category</h3>';
  const missed = [];
  Object.entries(categories).forEach(([cat, data]) => {
    const catPct = Math.round((data.correct / data.total) * 100);
    breakdownHTML += `<div class="breakdown-item"><span class="label">${cat}</span><span class="value">${data.correct}/${data.total} (${catPct}%)</span></div>`;
    if (catPct < 80) missed.push(cat);
  });
  document.getElementById('resultsBreakdown').innerHTML = breakdownHTML;

  // Results code for analytics
  const now = new Date().toISOString().split('T')[0];
  const code = `QUIZ_RESULT | ${QUIZ_DATA.title} | ${now} | Score: ${score}/${total} (${pct}%) | ${passed ? 'PASS' : 'FAIL'} | Time: ${mins}m${secs}s | Missed: ${missed.length > 0 ? missed.join(', ') : 'None'}`;
  document.getElementById('copyCode').textContent = code;
}

function copyResults() {
  const el = document.getElementById('copyCode');
  navigator.clipboard.writeText(el.textContent).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 2000);
  });
}

function retakeQuiz() {
  currentQuestion = 0;
  score = 0;
  answers = [];
  document.getElementById('resultsScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('nextBtn').textContent = 'Next';
}
</script>
</body>
</html>
